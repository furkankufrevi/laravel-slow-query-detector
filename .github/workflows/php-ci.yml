name: PHP CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - run: composer validate --strict
      - run: composer install --no-interaction
      - run: find src/ -name "*.php" -exec php -l {} \;

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ["8.1", "8.2", "8.3", "8.4"]
        laravel: ["^10.0", "^11.0", "^12.0"]
        exclude:
          - php-version: "8.1"
            laravel: "^11.0"
          - php-version: "8.1"
            laravel: "^12.0"
          - php-version: "8.2"
            laravel: "^12.0"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
      - run: composer require illuminate/support:${{ matrix.laravel }} illuminate/database:${{ matrix.laravel }} --no-interaction --no-update
      - run: composer install --no-interaction
